name: build

env:
  ZIG_VERSION: 0.16.0
  SQLITE_AMALGAMATION_YEAR: 2026
  SQLITE_AMALGAMATION_VERSION: 3530100
  SQLITE_AMALGAMATION_SHA3: 3c07136e4f6b5dd0c395be86455014039597bc65b6851f7111e88f71b6e06114

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  compile-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates python3

      - name: Download SQLite amalgamation
        run: python3 .forgejo/scripts/fetch-sqlite3.py

      - name: Setup Zig
        uses: https://codeberg.org/mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Verify Zig version
        run: test "$(zig version)" = "$ZIG_VERSION"

      - name: Compile amd64 binary
        run: zig build -Doptimize=ReleaseFast

      - name: Upload binary
        uses: https://data.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: relayd-amd64-linux
          path: zig-out/bin/relayd

  compile-aarch64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates python3

      - name: Download SQLite amalgamation
        run: python3 .forgejo/scripts/fetch-sqlite3.py

      - name: Setup Zig
        uses: https://codeberg.org/mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Verify Zig version
        run: test "$(zig version)" = "$ZIG_VERSION"

      - name: Compile aarch64 binary
        run: zig build -Doptimize=ReleaseFast -Dtarget=aarch64-linux-gnu

      - name: Upload binary
        uses: https://data.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: relayd-aarch64-linux
          path: zig-out/bin/relayd

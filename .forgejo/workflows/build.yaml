name: build

env:
  ZIG_VERSION: 0.16.0

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl xz-utils libsqlite3-dev

      - name: Setup Zig
        uses: https://codeberg.org/mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Verify Zig version
        run: test "$(zig version)" = "$ZIG_VERSION"

      - name: Compile release-safe binary
        run: zig build -Doptimize=ReleaseSafe

      - name: Upload binary
        uses: https://data.forgejo.org/forgejo/upload-artifact@v4
        with:
            name: relayd-amd64-linux
            path: zig-out/bin/relayd

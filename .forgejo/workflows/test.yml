name: test

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl xz-utils libsqlite3-dev

      - name: Setup Zig
        uses: https://codeberg.org/mlugg/setup-zig@v2

      - name: Format check
        run: |
          zig fmt --check $(find src tests -type f -name '*.zig' -print) test_root.zig build.zig

      - name: Build and test
        run: |
          zig build test
          zig build

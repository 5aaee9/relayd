name: build binary

env:
  RUST_VERSION: 1.95
  ZIG_VERSION: 0.16.0
  CARGO_ZIGBUILD_VERSION: 0.22.3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  compile:
    name: compile-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked --version "${CARGO_ZIGBUILD_VERSION}"

      - name: Compile musl Rust binary
        run: cargo zigbuild --locked --release --bin relayd --target "${{ matrix.target }}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: relayd-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/relayd

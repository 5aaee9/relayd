name: test

env:
  RUST_VERSION: 1.95
  ZIG_VERSION: 0.16.0
  BUILD_TARGET: x86_64-unknown-linux-musl
  CARGO_ZIGBUILD_VERSION: 0.22.3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl xz-utils libsqlite3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
          targets: ${{ env.BUILD_TARGET }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Rust format check
        run: cargo fmt -- --check

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest@0.9

      - name: Rust tests
        run: cargo nextest run --locked

      - name: Rust doc tests
        run: cargo test --locked --doc

      - name: Rust clippy
        run: cargo clippy --locked --lib --tests -- -D warnings

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked --version "${CARGO_ZIGBUILD_VERSION}"

      - name: Rust musl release build
        run: cargo zigbuild --locked --release --bin relayd --target "${BUILD_TARGET}"

  e2e-bandwidth:
    needs:
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl xz-utils libsqlite3-dev iperf3 python3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ env.BUILD_TARGET }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked --version "${CARGO_ZIGBUILD_VERSION}"

      - name: Build relayd musl binary
        run: cargo zigbuild --locked --release --bin relayd --target "${BUILD_TARGET}"

      - name: Run e2e bandwidth harness
        run: RELAYD_BIN="target/${BUILD_TARGET}/release/relayd" ./scripts/ci/e2e_iperf3.sh

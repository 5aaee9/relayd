name: test

env:
  RUST_VERSION: 1.95

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl xz-utils libsqlite3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Rust format check
        run: cargo fmt -- --check

      - name: Rust tests
        run: cargo test --locked

      - name: Rust clippy
        run: cargo clippy --locked --lib --tests -- -D warnings

      - name: Rust release build
        run: cargo build --locked --release --bin relayd

  e2e-bandwidth:
    needs:
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl xz-utils libsqlite3-dev iperf3 python3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build relayd
        run: cargo build --locked --release --bin relayd

      - name: Run e2e bandwidth harness
        run: RELAYD_BIN=target/release/relayd ./scripts/ci/e2e_iperf3.sh

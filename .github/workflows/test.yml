name: test

env:
  ZIG_VERSION: 0.16.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl xz-utils libsqlite3-dev

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Verify Zig version
        run: test "$(zig version)" = "$ZIG_VERSION"

      - name: Format check
        run: |
          zig fmt --check $(find src tests -type f -name '*.zig' -print) test_root.zig build.zig

      - name: Run tests
        run: zig build test

  e2e-bandwidth:
    needs:
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl xz-utils libsqlite3-dev iperf3 python3

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Verify Zig version
        run: test "$(zig version)" = "$ZIG_VERSION"

      - name: Build relayd
        run: zig build

      - name: Run e2e bandwidth harness
        run: ./scripts/ci/e2e_iperf3.sh
